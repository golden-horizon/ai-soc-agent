name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic rich pytest python-dotenv openai pydantic-ai

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Run multi-agent orchestrator test
        run: |
          python -m agents.multi_agent_orchestrator